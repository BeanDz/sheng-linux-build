name: 🌀 Build Arch Linux Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.1)'
        required: true
        default: '7.1'
      desktop_env:
        description: '桌面环境'
        type: choice
        options: [gnome, kde, xfce]
        default: 'gnome'
      boot_mode:
        description: '启动模式 (单系统覆盖 userdata / 双系统独立 linux)'
        type: choice
        options: [dual, single]
        default: 'dual'
      username:
        description: '自定义用户名'
        required: true
        default: 'xiaomi'
      password:
        description: '自定义密码'
        required: true
        default: '123456'
      skip_release:
        type: boolean
        default: false

permissions: { contents: write }

jobs:
  build-arch:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils
      - name: Download Native Arch Packages
        run: |
          set -euo pipefail
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version || '7.1' }}" --pattern "*.pkg.tar.zst" --repo "BeanDz/sheng-linux-build" --clobber
          echo "Downloaded Arch driver packages:"
          ls -lh *.pkg.tar.zst
          expected_patterns=(
            "alsa-xiaomi-sheng-*-aarch64.pkg.tar.zst"
            "firmware-xiaomi-sheng-*-aarch64.pkg.tar.zst"
            "linux-xiaomi-sheng-*-aarch64.pkg.tar.zst"
            "sheng-devauth-*-aarch64.pkg.tar.zst"
            "fastrpc-*-aarch64.pkg.tar.zst"
            "iio-sensor-proxy-*-aarch64.pkg.tar.zst"
            "libssc-*-aarch64.pkg.tar.zst"
            "sheng-sensors-*-aarch64.pkg.tar.zst"
          )
          for pattern in "${expected_patterns[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "::error::Missing Arch driver package matching: $pattern"
              exit 1
            fi
            echo "Found Arch driver package matching: $pattern"
          done
          echo "All 8 Arch driver packages were downloaded."
          wget -q -O mesa-common-dev_26.0.7-1_arm64.deb "http://ftp.br.debian.org/debian/pool/main/m/mesa/mesa-common-dev_26.0.8-1_arm64.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS
        run: |
          chmod +x sheng-arch-rootfs_build.sh
          # 注意：这里在最后追加了 boot_mode 参数
          sudo ./sheng-arch-rootfs_build.sh archlinux "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}" "${{ github.event.inputs.boot_mode || 'dual' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: archlinux-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}
          path: "*.7z"
      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: archlinux-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build RootFS
        run: |
          chmod +x sheng-arch-rootfs_build.sh
          sudo ./sheng-arch-rootfs_build.sh archlinux "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}"
          
      - uses: actions/upload-artifact@v4
        with:
          name: archlinux-${{ github.event.inputs.desktop_env }}
          path: "*.7z"
          
      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: archlinux-${{ github.event.inputs.desktop_env }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
