name: 🐧 Build Ubuntu 26.04 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        required: true
        default: '7.1'
      desktop_env:
        type: choice
        options: [gnome, kde, xfce]
        default: 'gnome'
      boot_mode:
        description: '启动模式 (单/双系统)'
        type: choice
        options: [dual, single]
        default: 'dual'
      username:
        required: true
        default: 'xiaomi'
      password:
        required: true
        default: '123456'
      skip_release:
        type: boolean
        default: false

permissions: { contents: write }

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils
      - name: Download Native Ubuntu Packages
        run: |
          set -euo pipefail
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version || '7.1' }}" --pattern "*.deb" --repo "BeanDz/sheng-linux-build" --clobber
          echo "Downloaded Ubuntu driver packages:"
          ls -lh *.deb
          expected_packages=(
            "alsa-xiaomi-sheng.deb"
            "firmware-xiaomi-sheng.deb"
            "linux-xiaomi-sheng.deb"
            "sheng-devauth.deb"
            "fastrpc_1.0.2-1_arm64.deb"
            "iio-sensor-proxy_99993.8-6_arm64.deb"
            "libssc_0.4.2-1_arm64.deb"
            "sheng-sensors_20240917-1_arm64.deb"
          )
          for pkg in "${expected_packages[@]}"; do
            if [ ! -f "$pkg" ]; then
              echo "::error::Missing Ubuntu driver package: $pkg"
              exit 1
            fi
            echo "Found Ubuntu driver package: $pkg"
          done
          echo "All 8 Ubuntu driver packages were downloaded."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          # 追加了 boot_mode 参数
          sudo ./build-ubuntu26-rootfs.sh "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}" "${{ github.event.inputs.boot_mode || 'dual' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}
          path: "*.7z"
      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: ubuntu26-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          sudo ./build-ubuntu26-rootfs.sh "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ github.event.inputs.desktop_env }}
          path: "*.7z"

      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: ubuntu26-${{ github.event.inputs.desktop_env }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
