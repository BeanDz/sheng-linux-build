name: 🌀 Build Fedora Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.1'
      desktop_env:
        type: choice
        options: [gnome, kde, xfce]
        default: 'gnome'
      boot_mode:
        description: '启动模式 (单/双系统)'
        type: choice
        options: [dual, single]
        default: 'dual'
      username:
        required: true
        default: 'xiaomi'
      password:
        required: true
        default: '123456'
      skip_release:
        type: boolean
        default: false

permissions: { contents: write }

jobs:
  build-fedora:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils
      - name: Download Native Fedora Packages
        run: |
          set -euo pipefail
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version || '7.1' }}" --pattern "*.rpm" --repo "BeanDz/sheng-linux-build" --clobber
          echo "Downloaded Fedora driver packages:"
          ls -lh *.rpm
          expected_patterns=(
            "alsa-xiaomi-sheng-*.aarch64.rpm"
            "firmware-xiaomi-sheng-*.aarch64.rpm"
            "linux-xiaomi-sheng-*.aarch64.rpm"
            "sheng-devauth-*.aarch64.rpm"
            "fastrpc-*.aarch64.rpm"
            "iio-sensor-proxy-*.aarch64.rpm"
            "libssc-*.aarch64.rpm"
            "sheng-sensors-*.aarch64.rpm"
            "xiaomi-mipps-auth-*.aarch64.rpm"
          )
          for pattern in "${expected_patterns[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "::error::Missing Fedora driver package matching: $pattern"
              exit 1
            fi
            echo "Found Fedora driver package matching: $pattern"
          done
          echo "All 9 Fedora driver packages were downloaded."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS
        run: |
          chmod +x sheng-fedora-rootfs_build.sh
          # 追加了 boot_mode 参数
          sudo ./sheng-fedora-rootfs_build.sh fedora "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}" "${{ github.event.inputs.boot_mode || 'dual' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}
          path: "*.7z"
      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: fedora-${{ github.event.inputs.desktop_env }}-${{ github.event.inputs.boot_mode }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build RootFS
        run: |
          chmod +x sheng-fedora-rootfs_build.sh
          sudo ./sheng-fedora-rootfs_build.sh fedora "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.desktop_env || 'gnome' }}" "${{ github.event.inputs.username || 'xiaomi' }}" "${{ github.event.inputs.password || '123456' }}"
          
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ github.event.inputs.desktop_env }}
          path: "*.7z"
          
      - uses: softprops/action-gh-release@v1
        if: ${{ !github.event.inputs.skip_release }}
        with:
          tag_name: fedora-${{ github.event.inputs.desktop_env }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
